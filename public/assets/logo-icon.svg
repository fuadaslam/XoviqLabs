<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background -->
    <linearGradient id="i-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C1018"/>
      <stop offset="100%" stop-color="#0F1623"/>
    </linearGradient>
    <!-- Mark gradient: teal → sapphire, diagonal -->
    <linearGradient id="i-mark" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DD4B0"/>
      <stop offset="100%" stop-color="#3B5FDB"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="i-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- X shape mask -->
    <mask id="i-xmask">
      <rect width="400" height="400" fill="black"/>
      <!-- diagonal arm 1 -->
      <line x1="90" y1="90" x2="310" y2="310" stroke="white" stroke-width="52" stroke-linecap="round"/>
      <!-- diagonal arm 2 -->
      <line x1="310" y1="90" x2="90" y2="310" stroke="white" stroke-width="52" stroke-linecap="round"/>
      <!-- node endpoints -->
      <circle cx="90"  cy="90"  r="31" fill="white"/>
      <circle cx="310" cy="90"  r="31" fill="white"/>
      <circle cx="90"  cy="310" r="31" fill="white"/>
      <circle cx="310" cy="310" r="31" fill="white"/>
    </mask>
    <!-- Rounded rect clip -->
    <clipPath id="i-clip">
      <rect width="400" height="400" rx="80"/>
    </clipPath>
    <!-- Subtle inner top shine -->
    <linearGradient id="i-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.08"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="400" height="400" rx="80" fill="url(#i-bg)"/>

  <!-- ── SUBTLE CIRCUIT GRID ── -->
  <g clip-path="url(#i-clip)" opacity="0.06">
    <!-- horizontal wires -->
    <line x1="0"   y1="90"  x2="400" y2="90"  stroke="#2DD4B0" stroke-width="1"/>
    <line x1="0"   y1="200" x2="400" y2="200" stroke="#2DD4B0" stroke-width="1"/>
    <line x1="0"   y1="310" x2="400" y2="310" stroke="#2DD4B0" stroke-width="1"/>
    <!-- vertical wires -->
    <line x1="90"  y1="0"   x2="90"  y2="400" stroke="#2DD4B0" stroke-width="1"/>
    <line x1="200" y1="0"   x2="200" y2="400" stroke="#2DD4B0" stroke-width="1"/>
    <line x1="310" y1="0"   x2="310" y2="400" stroke="#2DD4B0" stroke-width="1"/>
    <!-- junction dots -->
    <circle cx="90"  cy="90"  r="3.5" fill="#2DD4B0"/>
    <circle cx="310" cy="90"  r="3.5" fill="#2DD4B0"/>
    <circle cx="200" cy="90"  r="2.5" fill="#2DD4B0"/>
    <circle cx="90"  cy="200" r="2.5" fill="#2DD4B0"/>
    <circle cx="310" cy="200" r="2.5" fill="#2DD4B0"/>
    <circle cx="200" cy="200" r="2.5" fill="#2DD4B0"/>
    <circle cx="90"  cy="310" r="3.5" fill="#2DD4B0"/>
    <circle cx="310" cy="310" r="3.5" fill="#2DD4B0"/>
    <circle cx="200" cy="310" r="2.5" fill="#2DD4B0"/>
  </g>

  <!-- ── GLOW (soft blur behind the X) ── -->
  <g clip-path="url(#i-clip)" filter="url(#i-glow)">
    <rect width="400" height="400" fill="url(#i-mark)" mask="url(#i-xmask)" opacity="0.45"/>
  </g>

  <!-- ── X MARK ── -->
  <rect width="400" height="400" fill="url(#i-mark)" mask="url(#i-xmask)" clip-path="url(#i-clip)"/>

  <!-- ── INNER SHINE ── -->
  <rect width="400" height="220" rx="80" fill="url(#i-shine)" clip-path="url(#i-clip)"/>

  <!-- ── CENTER ACCENT ── -->
  <circle cx="200" cy="200" r="11" fill="white" opacity="0.35" clip-path="url(#i-clip)"/>
</svg>
