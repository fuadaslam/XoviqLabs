<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 100" width="410" height="100">
  <defs>
    <style>
      /* Icon background gradient */
      #l-bg {
        fill: url(#l-bg-grad);
      }
      
      /* CSS Animations */
      
      /* 1. X Arms Draw In */
      .arm-1 {
        stroke-dasharray: 63;
        stroke-dashoffset: 63;
        animation: drawArm 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        animation-delay: 0.1s;
      }
      .arm-2 {
        stroke-dasharray: 63;
        stroke-dashoffset: 63;
        animation: drawArm 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        animation-delay: 0.3s;
      }
      
      @keyframes drawArm {
        to { stroke-dashoffset: 0; }
      }

      /* 2. Glow behind X Arms Draw In + Pulse */
      .glow-arm-1 {
        stroke-dasharray: 63;
        stroke-dashoffset: 63;
        animation: drawArm 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards, pulseGlow 4s ease-in-out infinite 1.1s;
        animation-delay: 0.1s, 0.1s;
      }
      .glow-arm-2 {
        stroke-dasharray: 63;
        stroke-dashoffset: 63;
        animation: drawArm 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards, pulseGlow 4s ease-in-out infinite 1.3s;
        animation-delay: 0.3s, 0.3s;
      }
      
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 0.75; }
      }

      /* 3. Corner Node Dots Fade In (Safe fallback from CSS scale transform) */
      .node-dot {
        opacity: 0;
        animation: revealNode 0.5s ease-out forwards;
      }
      .node-1 { animation-delay: 0.7s; }
      .node-2 { animation-delay: 0.8s; }
      .node-3 { animation-delay: 0.9s; }
      .node-4 { animation-delay: 1.0s; }
      
      @keyframes revealNode {
        to { opacity: 1; }
      }

      /* 4. Center Accent pulse */
      .center-accent {
        opacity: 0;
        animation: revealCenter 0.6s ease-out forwards, pulseCenter 2.5s ease-in-out infinite 1.4s;
        animation-delay: 0.8s, 0.8s;
      }
      @keyframes revealCenter {
        to { opacity: 0.4; }
      }
      @keyframes pulseCenter {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.9; }
      }

      /* 5. Grid wires scanning fade */
      .grid-wire {
        opacity: 0;
        animation: revealGrid 1.2s ease forwards 0.1s;
      }
      @keyframes revealGrid {
        to { opacity: 0.07; }
      }

      /* 6. Divider line drawing down */
      .divider-line {
        stroke-dasharray: 56;
        stroke-dashoffset: 56;
        animation: drawDivider 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        animation-delay: 0.4s;
      }
      @keyframes drawDivider {
        to { stroke-dashoffset: 0; }
      }

      /* 7. Wordmark letters reveal (Pure opacity fade is 100% safe inside img tags) */
      .letter {
        opacity: 0;
        animation: revealLetter 0.5s ease-out forwards;
      }
      .l-x { animation-delay: 0.50s; }
      .l-o { animation-delay: 0.56s; }
      .l-v { animation-delay: 0.62s; }
      .l-i { animation-delay: 0.68s; }
      .l-q { animation-delay: 0.74s; }
      .l-l { animation-delay: 0.80s; }
      .l-a { animation-delay: 0.86s; }
      .l-b { animation-delay: 0.92s; }
      .l-s { animation-delay: 0.98s; }

      @keyframes revealLetter {
        to { opacity: 1; }
      }

      /* 8. Tagline letter-spacing expansion */
      .tagline {
        opacity: 0;
        animation: revealTagline 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        animation-delay: 1.1s;
      }
      @keyframes revealTagline {
        from { opacity: 0; letter-spacing: 0px; }
        to { opacity: 0.85; letter-spacing: 3.8px; }
      }
    </style>

    <!-- Icon background -->
    <linearGradient id="l-bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   color="#0C1018" stop-color="#0C1018"/>
      <stop offset="100%" color="#0F1623" stop-color="#0F1623"/>
    </linearGradient>

    <!-- Arm gradients -->
    <linearGradient id="l-arm1" x1="18" y1="28" x2="62" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DD4B0"/>
      <stop offset="100%" stop-color="#3B5FDB"/>
    </linearGradient>
    <linearGradient id="l-arm2" x1="62" y1="28" x2="18" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B5FDB"/>
      <stop offset="100%" stop-color="#2DD4B0"/>
    </linearGradient>

    <!-- Wordmark text gradient -->
    <linearGradient id="l-text" x1="110" y1="0" x2="450" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0F4FA"/>
      <stop offset="100%" stop-color="#B8C8E8"/>
    </linearGradient>

    <!-- Icon glow filter -->
    <filter id="l-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip icon to rounded rect -->
    <clipPath id="l-clip">
      <rect x="0" y="10" width="80" height="80" rx="16"/>
    </clipPath>

    <!-- Top shine -->
    <linearGradient id="l-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0.1"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ══ ICON MARK ══ -->
  <!-- Background -->
  <rect id="l-bg" x="0" y="10" width="80" height="80" rx="16"/>

  <!-- Subtle circuit grid -->
  <g clip-path="url(#l-clip)">
    <line class="grid-wire" x1="0"  y1="28" x2="80" y2="28" stroke="#2DD4B0" stroke-width="0.75"/>
    <line class="grid-wire" x1="0"  y1="72" x2="80" y2="72" stroke="#2DD4B0" stroke-width="0.75"/>
    <line class="grid-wire" x1="18" y1="10" x2="18" y2="90" stroke="#2DD4B0" stroke-width="0.75"/>
    <line class="grid-wire" x1="62" y1="10" x2="62" y2="90" stroke="#2DD4B0" stroke-width="0.75"/>
  </g>

  <!-- X arms (clipped, with gradient glow) -->
  <g clip-path="url(#l-clip)" filter="url(#l-glow)">
    <line class="glow-arm-1" x1="18" y1="28" x2="62" y2="72" stroke="url(#l-arm1)" stroke-width="10" stroke-linecap="round"/>
    <line class="glow-arm-2" x1="62" y1="28" x2="18" y2="72" stroke="url(#l-arm2)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- X arms crisp -->
  <g clip-path="url(#l-clip)">
    <line class="arm-1" x1="18" y1="28" x2="62" y2="72" stroke="url(#l-arm1)" stroke-width="10" stroke-linecap="round"/>
    <line class="arm-2" x1="62" y1="28" x2="18" y2="72" stroke="url(#l-arm2)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Node dots -->
    <circle class="node-dot node-1" cx="18" cy="28" r="6" fill="#2DD4B0"/>
    <circle class="node-dot node-2" cx="62" cy="28" r="6" fill="#5578E8"/>
    <circle class="node-dot node-3" cx="18" cy="72" r="6" fill="#2DD4B0"/>
    <circle class="node-dot node-4" cx="62" cy="72" r="6" fill="#3B5FDB"/>
    
    <!-- Centre accent -->
    <circle class="center-accent" cx="40" cy="50" r="3.5" fill="white"/>
  </g>

  <!-- Top shine -->
  <rect x="0" y="10" width="80" height="46" rx="16" fill="url(#l-shine)" clip-path="url(#l-clip)"/>

  <!-- ══ DIVIDER ══ -->
  <line class="divider-line" x1="96" y1="22" x2="96" y2="78" stroke="#F0F4FA" stroke-width="1" stroke-opacity="0.12"/>

  <!-- ══ WORDMARK (Nullmask-style custom vector paths) ══ -->
  <g transform="translate(110, 28)" fill="url(#l-text)">
    <!-- X -->
    <g class="letter l-x" transform="translate(0, 0)">
      <path d="M 0.74 0.3 H 5.92 A 0.7 0.7 0 0 1 6.54 0.69 L 28.54 28.81 A 0.7 0.7 0 0 1 28.49 29.54 H 23.31 A 0.7 0.7 0 0 1 22.69 29.15 L 0.69 1.03 A 0.7 0.7 0 0 1 0.74 0.3 Z" />
      <path d="M 28.49 0.3 H 23.31 A 0.7 0.7 0 0 0 22.69 0.69 L 0.69 28.81 A 0.7 0.7 0 0 0 0.74 29.54 H 5.92 A 0.7 0.7 0 0 0 6.54 29.15 L 28.54 1.03 A 0.7 0.7 0 0 0 28.49 0.3 Z" />
    </g>
    <!-- O -->
    <g class="letter l-o" transform="translate(34, 0)">
      <path fill-rule="evenodd" d="M 0.74 0.3 H 28.49 A 0.7 0.7 0 0 1 29.23 1.05 V 28.8 A 0.7 0.7 0 0 1 28.49 29.54 H 0.74 A 0.7 0.7 0 0 1 0 28.8 V 1.05 A 0.7 0.7 0 0 1 0.74 0.3 Z M 5.92 5.49 H 23.31 A 0.7 0.7 0 0 1 24.05 6.23 V 23.64 A 0.7 0.7 0 0 1 23.31 24.38 H 5.92 A 0.7 0.7 0 0 1 5.18 23.64 V 6.23 A 0.7 0.7 0 0 1 5.92 5.49 Z" />
    </g>
    <!-- V -->
    <g class="letter l-v" transform="translate(68, 0)">
      <path d="M 0.74 0.3 H 5.92 A 0.7 0.7 0 0 1 6.59 0.74 L 17.13 29.1 A 0.7 0.7 0 0 1 16.48 29.54 H 12.02 A 0.7 0.7 0 0 1 11.37 29.1 L 0.09 0.74 A 0.7 0.7 0 0 1 0.74 0.3 Z" />
      <path d="M 28.49 0.3 H 23.31 A 0.7 0.7 0 0 0 22.64 0.74 L 12.1 29.1 A 0.7 0.7 0 0 0 12.75 29.54 H 17.21 A 0.7 0.7 0 0 0 17.86 29.1 L 29.14 0.74 A 0.7 0.7 0 0 0 28.49 0.3 Z" />
    </g>
    <!-- I -->
    <g class="letter l-i" transform="translate(102, 0)">
      <path d="M 0.74 0.3 H 7.26 A 0.7 0.7 0 0 1 7.96 1.05 V 28.8 A 0.7 0.7 0 0 1 7.26 29.54 H 0.74 A 0.7 0.7 0 0 1 0 28.8 V 1.05 A 0.7 0.7 0 0 1 0.74 0.3 Z" />
    </g>
    <!-- Q -->
    <g class="letter l-q" transform="translate(115, 0)">
      <path fill-rule="evenodd" d="M 0.74 0.3 H 28.49 A 0.7 0.7 0 0 1 29.23 1.05 V 28.8 A 0.7 0.7 0 0 1 28.49 29.54 H 0.74 A 0.7 0.7 0 0 1 0 28.8 V 1.05 A 0.7 0.7 0 0 1 0.74 0.3 Z M 5.92 5.49 H 23.31 A 0.7 0.7 0 0 1 24.05 6.23 V 23.64 A 0.7 0.7 0 0 1 23.31 24.38 H 5.92 A 0.7 0.7 0 0 1 5.18 23.64 V 6.23 A 0.7 0.7 0 0 1 5.92 5.49 Z" />
      <path d="M 17.75 17.93 H 22.93 A 0.7 0.7 0 0 1 23.55 18.32 L 28.54 28.81 A 0.7 0.7 0 0 1 28.49 29.54 H 23.31 A 0.7 0.7 0 0 1 22.69 29.15 L 17.7 18.66 A 0.7 0.7 0 0 1 17.75 17.93 Z" />
    </g>
    <!-- L -->
    <g class="letter l-l" transform="translate(149, 0)">
      <path d="M 5.92 22.89 V 1.05 A 0.7 0.7 0 0 0 5.18 0.3 H 0.74 A 0.7 0.7 0 0 0 0 1.05 V 23.64 A 0.7 0.7 0 0 0 0.74 24.38 H 4.44 A 0.7 0.7 0 0 0 5.18 25.12 V 28.8 A 0.7 0.7 0 0 0 5.92 29.54 H 22.18 A 0.7 0.7 0 0 0 22.92 28.8 V 24.38 A 0.7 0.7 0 0 0 22.18 23.64 H 6.67 A 0.7 0.7 0 0 0 5.92 22.89 Z" />
    </g>
    <!-- A -->
    <g class="letter l-a" transform="translate(177, 0)">
      <path fill-rule="evenodd" d="M 28.49 5.49 H 24.79 A 0.7 0.7 0 0 0 24.05 4.75 V 1.05 A 0.7 0.7 0 0 0 23.3 0.3 H 5.93 A 0.7 0.7 0 0 0 5.19 1.05 V 4.75 A 0.7 0.7 0 0 0 4.44 5.49 H 0.74 A 0.7 0.7 0 0 0 0 6.23 V 28.8 A 0.7 0.7 0 0 0 0.74 29.54 H 5.19 A 0.7 0.7 0 0 0 5.25 29.54 C 5.63 29.51 5.93 29.19 5.93 28.8 V 17.92 H 23.3 V 28.8 C 23.3 29.19 23.6 29.51 23.97 29.54 C 24.0 29.54 24.02 29.54 24.05 29.54 H 28.49 A 0.7 0.7 0 0 0 29.23 28.8 V 6.23 A 0.7 0.7 0 0 0 28.49 5.49 Z M 5.93 11.99 V 6.98 C 5.93 6.64 6.15 6.36 6.46 6.26 H 22.77 C 23.08 6.36 23.3 6.64 23.3 6.98 V 11.99 H 5.93 Z" />
    </g>
    <!-- B -->
    <g class="letter l-b" transform="translate(211, 0)">
      <path d="M 0.74 0.3 H 5.92 A 0.7 0.7 0 0 1 6.62 1.05 V 28.8 A 0.7 0.7 0 0 1 5.92 29.54 H 0.74 A 0.7 0.7 0 0 1 0 28.8 V 1.05 A 0.7 0.7 0 0 1 0.74 0.3 Z" />
      <path fill-rule="evenodd" d="M 5.92 0.3 H 23.31 A 0.7 0.7 0 0 1 24.05 1.05 V 13.96 A 0.7 0.7 0 0 1 23.31 14.7 H 5.92 Z M 11.1 5.49 H 18.13 V 9.51 H 11.1 Z" />
      <path fill-rule="evenodd" d="M 5.92 14.7 H 23.31 A 0.7 0.7 0 0 1 24.05 15.44 V 28.8 A 0.7 0.7 0 0 1 23.31 29.54 H 5.92 Z M 11.1 19.89 H 18.13 V 24.35 H 11.1 Z" />
    </g>
    <!-- S -->
    <g class="letter l-s" transform="translate(245, 0)">
      <path d="M 5.93 6.97 V 11.29 A 0.7 0.7 0 0 0 6.67 12.03 H 23.31 A 0.7 0.7 0 0 0 24.06 12.77 V 16.45 A 0.7 0.7 0 0 0 24.8 17.19 H 28.49 A 0.7 0.7 0 0 0 29.23 17.93 V 23.64 A 0.7 0.7 0 0 0 28.49 24.38 H 24.8 A 0.7 0.7 0 0 0 24.06 25.12 V 28.8 A 0.7 0.7 0 0 0 23.31 29.54 H 0.74 A 0.7 0.7 0 0 0 0 28.8 V 24.38 A 0.7 0.7 0 0 0 0.74 23.64 H 22.57 A 0.7 0.7 0 0 0 23.31 22.9 V 17.61 A 0.7 0.7 0 0 0 22.57 16.87 H 5.92 A 0.7 0.7 0 0 0 5.18 16.12 V 12.45 A 0.7 0.7 0 0 0 4.43 11.71 H 0.74 A 0.7 0.7 0 0 0 0 10.96 V 6.23 A 0.7 0.7 0 0 0 0.74 5.49 H 4.44 A 0.7 0.7 0 0 0 5.18 4.75 V 1.05 A 0.7 0.7 0 0 0 5.93 0.3 H 28.49 A 0.7 0.7 0 0 0 29.23 1.05 V 5.49 A 0.7 0.7 0 0 0 28.49 6.23 H 6.67 A 0.7 0.7 0 0 0 5.93 6.97 Z" />
    </g>
  </g>

  <!-- ══ TAGLINE ══ -->
  <text
    class="tagline"
    x="111" y="78"
    font-family="'Roboto', 'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="16"
    fill="#2DD4B0"
    fill-opacity="0.85"
    letter-spacing="3.8">INTELLIGENT BY DESIGN</text>
</svg>
